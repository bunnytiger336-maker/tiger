<!DOCTYPE html>
<html>
<head>
<title>Designer Tote Bag</title>
<style>
body{
    font-family:Arial;
    background:#f8e9ec;
    text-align:center;
}

h1{color:#e75480;}

.product{
    background:white;
    width:300px;
    margin:40px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    border-radius:10px;
}

button{
    background:#e75480;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
}
</style>
</head>

<body>

<h1>👜 Designer Tote Bag</h1>

<div class="product">
    <img src="https://i.imgur.com/2nCt3Sbl.jpg">
    <h2>Designer Tote Bag</h2>
    <p>PKR 12,000</p>
    <button>Add to Cart</button>
</div>

</body>
</html>
