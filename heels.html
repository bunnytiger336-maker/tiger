<!DOCTYPE html>
<html>
<head>
<title>Red Velvet Heels</title>
<style>
body{
    font-family:Arial;
    background:#f8e9ec;
    text-align:center;
}

h1{color:#e75480;}

.product{
    background:white;
    width:300px;
    margin:40px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    border-radius:10px;
}

button{
    background:#e75480;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
}
</style>
</head>

<body>

<h1>👠 Red Velvet Heels</h1>

<div class="product">
    <img src="https://i.imgur.com/VFh1KxQ.jpg">
    <h2>Red Velvet Heels</h2>
    <p>PKR 9,500</p>
    <button>Add to Cart</button>
</div>

</body>
</html>
