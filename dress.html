<!DOCTYPE html>
<html>
<head>
<title>Summer Elegance Dress</title>
<style>
body{
    font-family:Arial;
    background:#f8e9ec;
    text-align:center;
}

h1{
    color:#e75480;
}

.product{
    background:white;
    width:300px;
    margin:40px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    border-radius:10px;
}

button{
    background:#e75480;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>👗 Summer Elegance Dress</h1>

<div class="product">
    <img src="https://i.imgur.com/7XqQZ6R.jpg">
    <h2>Summer Elegance Dress</h2>
    <p>PKR 8,500</p>
    <button>Add to Cart</button>
</div>

</body>
</html>
